name: ECS Auto Switch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  switch:
    environment: env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets are present
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CN_ACCESS_KEY_ID: ${{ secrets.CN_ACCESS_KEY_ID }}
          CN_ACCESS_KEY_SECRET: ${{ secrets.CN_ACCESS_KEY_SECRET }}
          CN_INSTANCE_ID: ${{ secrets.CN_INSTANCE_ID }}
          CN_REGION_ID: ${{ secrets.CN_REGION_ID }}
          INTL_ACCESS_KEY_ID: ${{ secrets.INTL_ACCESS_KEY_ID }}
          INTL_ACCESS_KEY_SECRET: ${{ secrets.INTL_ACCESS_KEY_SECRET }}
          INTL_INSTANCE_ID: ${{ secrets.INTL_INSTANCE_ID }}
          INTL_REGION_ID: ${{ secrets.INTL_REGION_ID }}
        run: |
          missing=0
          for key in \
            TG_BOT_TOKEN TG_CHAT_ID \
            CN_ACCESS_KEY_ID CN_ACCESS_KEY_SECRET CN_INSTANCE_ID CN_REGION_ID \
            INTL_ACCESS_KEY_ID INTL_ACCESS_KEY_SECRET INTL_INSTANCE_ID INTL_REGION_ID
          do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing secret::$key is empty or unavailable in this run."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "This usually means the job cannot read environment/repository secrets in this event context."
            echo "Check job.environment, Environment name, branch restrictions, and whether this run comes from a fork/Dependabot."
            exit 1
          fi

      - name: Run ECS switch
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CN_ACCESS_KEY_ID: ${{ secrets.CN_ACCESS_KEY_ID }}
          CN_ACCESS_KEY_SECRET: ${{ secrets.CN_ACCESS_KEY_SECRET }}
          CN_INSTANCE_ID: ${{ secrets.CN_INSTANCE_ID }}
          CN_REGION_ID: ${{ secrets.CN_REGION_ID }}
          INTL_ACCESS_KEY_ID: ${{ secrets.INTL_ACCESS_KEY_ID }}
          INTL_ACCESS_KEY_SECRET: ${{ secrets.INTL_ACCESS_KEY_SECRET }}
          INTL_INSTANCE_ID: ${{ secrets.INTL_INSTANCE_ID }}
          INTL_REGION_ID: ${{ secrets.INTL_REGION_ID }}
          ALIYUN_CDT_NAME: ${{ secrets.ALIYUN_CDT_NAME }}
          ALIYUN_CDT_PROGRESS_BAR: ${{ secrets.ALIYUN_CDT_PROGRESS_BAR }}
          ALIYUN_CDT_PROGRESS_PERCENT: ${{ secrets.ALIYUN_CDT_PROGRESS_PERCENT }}
          ALIYUN_CDT_USAGE: ${{ secrets.ALIYUN_CDT_USAGE }}
          ALIYUN_CDT_REGION_NAME: ${{ secrets.ALIYUN_CDT_REGION_NAME }}
          ALIYUN_CDT_EXPIRES_AT: ${{ secrets.ALIYUN_CDT_EXPIRES_AT }}
          ALIYUN_CDT_SECURITY_GROUP_STATUS: ${{ secrets.ALIYUN_CDT_SECURITY_GROUP_STATUS }}
          CN_TRAFFIC_USAGE: ${{ secrets.CN_TRAFFIC_USAGE }}
          INTL_TRAFFIC_USAGE: ${{ secrets.INTL_TRAFFIC_USAGE }}
          TRAFFIC_LIMIT_GB: ${{ secrets.TRAFFIC_LIMIT_GB }}
        run: |
          python scripts/ecs_switch.py
